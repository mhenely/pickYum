name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      # Tests stub out network/DB calls but the source still references these
      # and validateEnv() would refuse to boot without them.
      JWT_SECRET: test-jwt-secret-for-ci
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm test

  frontend:
    name: Frontend (typecheck + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
